name: Deploy to Azure Container Apps

on:
    push:
        branches:
            - main
permissions:
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Log in to Azure
          uses: azure/login@v1
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
            
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2

        - name: Log in to Container Registry
          run: |
            echo "${{ secrets.CONTAINER_REGISTRY_PASSWORD }}" | docker login ${{ secrets.CONTAINER_REGISTRY_USERNAME }}.azurecr.io -u ${{ secrets.CONTAINER_REGISTRY_USERNAME }} --password-stdin

        - name: Build and Push Docker Image
          run: |
            IMAGE_NAME=${{ secrets.CONTAINER_REGISTRY_USERNAME }}.azurecr.io/wajo-prod:${{ github.sha }}
            docker build -t $IMAGE_NAME .
            docker push $IMAGE_NAME
