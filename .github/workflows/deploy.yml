name: CI/CD
on:
  push:
    branches:
      - main
      - pilot

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          clean: false

      - name: Set Branch-Specific Docker Compose File
        id: set-docker-file
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DOCKER_COMPOSE_FILE=docker-compose.yml" >> $GITHUB_ENV
            echo "APP_ENV=main" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "pilot" ]]; then
            echo "DOCKER_COMPOSE_FILE=docker-compose.pilot.yml" >> $GITHUB_ENV
            echo "APP_ENV=pilot" >> $GITHUB_ENV
          else
            echo "Unsupported branch for deployment: ${{ github.ref_name }}"
            exit 1
          fi
        shell: bash

      - name: Stop Running Containers
        run: docker-compose -f ${{ env.DOCKER_COMPOSE_FILE }} down

      - name: Deploy Containers
        run: docker-compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d --build
