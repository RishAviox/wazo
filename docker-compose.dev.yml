version: '3.9'

services:

  wajo-redis:
    ports: !reset []
  wajo-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: wajo_dev
      POSTGRES_USER: wajo_user
      POSTGRES_PASSWORD: wajo_password
    ports:
      - "5433:5432"  # Using port 5433 to avoid conflicts with other PostgreSQL instances
    volumes:
      - wajo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wajo_user -d wajo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    environment:
      - django-settings-module=wajo_backend.settings
      - DJANGO_DATABASE=docker
    entrypoint: ""
    # command: python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000
    command: python manage.py runserver 0.0.0.0:8000 --settings=wajo_backend.settings_dev
    ports: !override
      - "8003:8000"
    volumes:
      - .:/app
    depends_on:
      wajo-postgres:
        condition: service_healthy

  wajo-celery-worker:
    environment:
      - django-settings-module=wajo_backend.settings_dev
      - DJANGO_DATABASE=docker
    entrypoint: ""
    command: celery -A wajo_backend worker --loglevel=INFO
    volumes:
      - .:/app
    depends_on:
      wajo-postgres:
        condition: service_healthy

  wajo-celery-beat:
    # environment:
    #   - django-settings-module=wajo_backend.settings
    # entrypoint: ""
    # command: celery -A wajo_backend beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    # volumes:
    #   - .:/app
    profiles: ["dont-run"]

volumes:
  wajo_postgres_data:
